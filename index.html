<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marathon → 50-Mile Ultra Training Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', 'SF Pro Display', -apple-system, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px 16px;
  }
  ::-webkit-scrollbar { height: 4px; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

  .container { max-width: 900px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 20px; }
  .header-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .header h1 { font-size: 28px; font-weight: 900; line-height: 1.1; }
  .header h1 span { color: #EF4444; }
  .header-sub { font-size: 13px; color: #64748b; margin-top: 6px; }

  /* Phase filters */
  .phase-filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; }
  .phase-btn {
    padding: 8px 16px; border-radius: 10px; border: 2px solid transparent;
    background: rgba(255,255,255,0.03); color: #64748b; font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.15s;
  }
  .phase-btn .count { font-size: 11px; margin-left: 6px; opacity: 0.6; }

  /* Week nav */
  .week-nav {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px 16px; margin-bottom: 16px;
  }
  .nav-btn {
    background: rgba(255,255,255,0.06); border: none; border-radius: 8px;
    width: 36px; height: 36px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-family: inherit; color: #e2e8f0;
  }
  .nav-btn:disabled { color: #334155; cursor: default; }
  .week-info { flex: 1; text-align: center; }
  .week-phase { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .week-title { font-size: 18px; font-weight: 800; }
  .week-miles { font-size: 13px; color: #94a3b8; margin-top: 2px; }
  .week-miles span { color: #e2e8f0; font-weight: 700; }

  /* Day grid */
  .day-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px; margin-bottom: 20px;
  }
  .day-card {
    border-radius: 8px; padding: 10px 12px; min-height: 80px;
    display: flex; flex-direction: column; gap: 3px; border-left: 3px solid;
  }
  .day-card.rest-empty { min-height: 60px; opacity: 0.5; }
  .day-header { display: flex; justify-content: space-between; align-items: center; }
  .day-name { font-size: 12px; font-weight: 800; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; }
  .day-icon { font-size: 14px; }
  .day-run { font-size: 14px; font-weight: 700; color: #e2e8f0; line-height: 1.3; }
  .day-pace { font-size: 11px; color: #94a3b8; }
  .day-hr { font-size: 11px; color: #f87171; }
  .day-rest-text { font-size: 13px; color: #64748b; font-style: italic; margin-top: 4px; }

  /* Lift badge */
  .lift-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3);
    border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700;
    color: #A78BFA; cursor: pointer; margin-top: 4px; font-family: inherit;
    transition: all 0.15s;
  }
  .lift-badge:hover { background: rgba(139,92,246,0.3); }

  /* All weeks bar */
  .all-weeks { margin-bottom: 24px; }
  .all-weeks-label { font-size: 11px; font-weight: 700; color: #475569; margin-bottom: 8px; letter-spacing: 1px; }
  .week-dots { display: flex; gap: 3px; flex-wrap: wrap; }
  .week-dot {
    height: 28px; border-radius: 6px; border: 2px solid transparent;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800;
  }

  /* Pace zones */
  .pace-section {
    background: rgba(255,255,255,0.02); border-radius: 12px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .pace-label { font-size: 11px; font-weight: 700; color: #475569; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
  .pace-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
  .pace-card { padding: 10px 12px; border-radius: 8px; border-left: 3px solid; }
  .pace-card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .pace-card-value { font-size: 16px; font-weight: 800; color: #e2e8f0; }
  .pace-card-note { font-size: 10px; color: #94a3b8; margin-top: 2px; }
  .hr-warning {
    margin-top: 10px; padding: 8px 12px; border-radius: 8px;
    background: rgba(239,68,68,0.06); font-size: 12px; color: #f87171;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: 16px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #1e293b; border-radius: 16px; padding: 24px; max-width: 480px; width: 100%;
    border: 1px solid rgba(139,92,246,0.3); box-shadow: 0 24px 48px rgba(0,0,0,0.4);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-lift-label { font-size: 11px; font-weight: 700; color: #A78BFA; letter-spacing: 1px; text-transform: uppercase; }
  .modal-lift-name { font-size: 20px; font-weight: 800; color: #e2e8f0; }
  .modal-close {
    background: rgba(255,255,255,0.1); border: none; border-radius: 8px;
    width: 32px; height: 32px; color: #94a3b8; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-family: inherit;
  }
  .exercise-list { display: flex; flex-direction: column; gap: 6px; }
  .exercise-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: 8px;
  }
  .exercise-row.striped { background: rgba(139,92,246,0.06); }
  .exercise-name { font-size: 14px; font-weight: 600; color: #e2e8f0; }
  .exercise-weight { font-size: 12px; color: #A78BFA; }
  .exercise-sets {
    font-size: 13px; font-weight: 700; color: #c4b5fd;
    background: rgba(139,92,246,0.15); padding: 4px 10px; border-radius: 6px; white-space: nowrap;
  }
</style>
</head>

const TYPE_STYLES = {
  rest: { bg: "rgba(100,116,139,0.08)", border: "#475569", icon: "😴" },
  easy: { bg: "rgba(59,130,246,0.08)", border: "#3B82F6", icon: "🏃" },
  long: { bg: "rgba(16,185,129,0.08)", border: "#10B981", icon: "🏔️" },
  tempo: { bg: "rgba(245,158,11,0.08)", border: "#F59E0B", icon: "⚡" },
  recovery: { bg: "rgba(139,92,246,0.08)", border: "#8B5CF6", icon: "🧘" },
  race: { bg: "rgba(239,68,68,0.1)", border: "#EF4444", icon: "🏁" },
  b2b: { bg: "rgba(236,72,153,0.08)", border: "#EC4899", icon: "🔄" },
};

let currentWeek = 0;
let selectedPhase = "All";

function getFiltered() {
  if (selectedPhase === "All") return weeks;
  return weeks.filter(w => w.phase === selectedPhase);
}

function openModal(key) {
  const lift = LIFT_DETAILS[key];
  if (!lift) return;
  const overlay = document.getElementById("modal-overlay");
  const content = document.getElementById("modal-content");
  content.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-lift-label">🏋️ ${key}</div>
        <div class="modal-lift-name">${lift.name}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="exercise-list">
      ${lift.exercises.map((ex, i) => `
        <div class="exercise-row ${i % 2 === 0 ? 'striped' : ''}">
          <div>
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-weight">${ex.weight}</div>
          </div>
          <div class="exercise-sets">${ex.sets}</div>
        </div>
      `).join("")}
    </div>
  `;
  overlay.classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.add("hidden");
}

document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

function render() {
  const filtered = getFiltered();
  if (currentWeek >= filtered.length) currentWeek = 0;
  const week = filtered[currentWeek];
  const phase = PHASES[week.phase];

  const phaseCounts = { Base: 0, Marathon: 0, Recovery: 0, Ultra: 0 };
  weeks.forEach(w => phaseCounts[w.phase]++);

  const app = document.getElementById("app");
  app.innerHTML = `
    <!-- Header -->
    <div class="header">
      <div class="header-label">Training Plan</div>
      <h1>Marathon → <span>50-Mile Ultra</span></h1>
      <div class="header-sub">Apr 2026 – Dec 2026 · 39 weeks · Long runs: Sunday · Lift-only: Tue &amp; Sat</div>
    </div>

    <!-- Phase Filters -->
    <div class="phase-filters">
      ${["All", "Base", "Marathon", "Recovery", "Ultra"].map(p => {
        const active = selectedPhase === p;
        const col = p === "All" ? "#94a3b8" : PHASES[p].color;
        return `<button class="phase-btn" style="${active ? `border-color:${col};background:${col}15;color:${col}` : ''}" onclick="selectedPhase='${p}';currentWeek=0;render()">
          ${p === "All" ? "All Weeks" : PHASES[p].label}<span class="count">${p === "All" ? 39 : phaseCounts[p]}</span>
        </button>`;
      }).join("")}
    </div>

    <!-- Week Nav -->
    <div class="week-nav">
      <button class="nav-btn" ${currentWeek === 0 ? 'disabled' : ''} onclick="currentWeek=Math.max(0,currentWeek-1);render()">‹</button>
      <div class="week-info">
        <div class="week-phase" style="color:${phase.color}">${phase.label} · Week ${week.wk}</div>
        <div class="week-title">Week of ${week.of}</div>
        <div class="week-miles">Target: <span>${week.miles} mi</span></div>
      </div>
      <button class="nav-btn" ${currentWeek === filtered.length - 1 ? 'disabled' : ''} onclick="currentWeek=Math.min(${filtered.length - 1},currentWeek+1);render()">›</button>
    </div>

    <!-- Day Grid -->
    <div class="day-grid">
      ${week.days.map(day => {
        const st = TYPE_STYLES[day.type] || TYPE_STYLES.rest;
        const isRestEmpty = day.type === "rest" && !day.lift;
        return `<div class="day-card ${isRestEmpty ? 'rest-empty' : ''}" style="background:${st.bg};border-left-color:${st.border};${isRestEmpty ? 'opacity:0.5' : ''}">
          <div class="day-header">
            <span class="day-name">${day.d}</span>
            <span class="day-icon">${st.icon}</span>
          </div>
          ${day.run ? `
            <div class="day-run">${day.run}</div>
            ${day.pace ? `<div class="day-pace">Pace: ${day.pace}</div>` : ''}
            ${day.hr ? `<div class="day-hr">HR: ${day.hr} bpm</div>` : ''}
          ` : `
            <div class="day-rest-text">${day.lift ? 'Lift only' : 'Full rest'}</div>
          `}
          ${day.lift ? `<button class="lift-badge" onclick="openModal('${day.lift}')">🏋️ ${day.lift}</button>` : ''}
        </div>`;
      }).join("")}
    </div>

    <!-- All Weeks -->
    <div class="all-weeks">
      <div class="all-weeks-label">ALL WEEKS</div>
      <div class="week-dots">
        ${filtered.map((w, i) => {
          const p = PHASES[w.phase];
          const active = i === currentWeek;
          return `<button class="week-dot" style="width:${active ? 28 : 18}px;background:${active ? p.color : p.color + '20'};${active ? `border-color:${p.accent};color:#fff` : 'color:transparent'}" title="Week ${w.wk} - ${w.phase} (${w.of})" onclick="currentWeek=${i};render()">${active ? w.wk : ''}</button>`;
        }).join("")}
      </div>
    </div>

    <!-- Pace Zones -->
    <div class="pace-section">
      <div class="pace-label">Your Pace Zones (adjusted for HR data)</div>
      <div class="pace-grid">
        ${[
          { label: "Easy", pace: "10:00–10:45", color: "#3B82F6", note: "Summer: 10:30–11:30" },
          { label: "Long Run", pace: "10:00–11:00", color: "#10B981", note: "Summer: 10:30–12:00" },
          { label: "Tempo", pace: "8:30–8:50", color: "#F59E0B", note: "Summer: 8:50–9:15" },
          { label: "MGP", pace: "9:00–9:05", color: "#EF4444", note: "Sub-4:00 target" },
          { label: "Ultra", pace: "11:00–13:00", color: "#EC4899", note: "Walk hills freely" },
        ].map(z => `
          <div class="pace-card" style="background:${z.color}10;border-left-color:${z.color}">
            <div class="pace-card-label" style="color:${z.color}">${z.label}</div>
            <div class="pace-card-value">${z.pace}</div>
            <div class="pace-card-note">${z.note}</div>
          </div>
        `).join("")}
      </div>
      <div class="hr-warning">⚠️ Run by heart rate in the heat, not pace. Target 135–145 bpm for easy runs. If HR &gt; 150 on an easy day, slow down or walk.</div>
    </div>
  `;
}

render();
</script>
